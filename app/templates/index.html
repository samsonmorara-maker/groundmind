{% extends "base.html" %}


{% block page_content %}
<h1>Latest Posts</h1>
<div class="row">
{% for post in posts %}
<div class="col-md-4">
<div class="card">
<div class="card-body">
<h3>
{{ post.title }}
</h3>
<p>
{{ post.excerpt }}
</p>
<button class="btn btn-primary">
Read More
</button>
</div>
</div>
</div>
{% endfor %}
</div>
{% endblock %}
